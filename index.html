<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐺 狼人杀 · 无网版</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🐺 狼人杀 · 无网版</h1>

    <!-- 人数选择 -->
    <div class="section">
      <label>玩家人数：</label>
      <select id="playerCount">
        <option value="4">4人</option>
        <option value="5">5人</option>
        <option value="6">6人</option>
        <option value="7">7人</option>
        <option value="8">8人</option>
        <option value="9">9人</option>
        <option value="10">10人</option>
        <option value="11">11人</option>
        <option value="12">12人</option>
        <option value="13">13人</option>
        <option value="14">14人</option>
        <option value="15">15人</option>
        <option value="16">16人</option>
        <option value="17">17人</option>
        <option value="18">18人</option>
      </select>
    </div>

    <!-- 创建游戏按钮 -->
    <button id="createBtn">✅ 创建游戏</button>

    <!-- 房主控制面板（仅房主可见） -->
    <div id="hostPanel" style="display:none; margin-top:20px; padding:15px; background:#f8f9fa; border-radius:10px;">
      <h3>🎮 房主控制面板</h3>
      <p>当前玩家：<span id="currentPlayers">0</span> / <span id="totalPlayers">0</span></p>
      <button id="startGameBtn">▶️ 开始游戏</button>
    </div>

    <!-- 加入游戏区域 -->
    <div class="section">
      <label>游戏码：</label>
      <input type="text" id="gameCode" placeholder="输入6位字母数字" maxlength="6" />
      <button id="joinBtn">👉 加入游戏</button>
    </div>

    <p class="tip">💡 将此链接分享到微信群，朋友复制游戏码即可同步！</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
