<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎮 狼人杀 · 游戏中</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🐺 狼人杀 · 无网版</h1>

    <div class="section">
      <p><strong>游戏码：</strong><span id="gameCodeDisplay"></span></p>
      <p><strong>你的身份：</strong><span id="yourRole"></span></p>
      <p><strong>当前阶段：</strong><span id="phaseDisplay"></span></p>
    </div>

    <div class="section" id="voteSection" style="display:none;">
      <label>请选择你要投票的人：</label>
      <div id="playersList"></div>
      <button id="submitVoteBtn">🗳️ 提交投票</button>
    </div>

    <div class="section" id="actionSection" style="display:none;">
      <p>请执行你的角色技能：</p>
      <button id="saveBtn">🛡️ 救人</button>
      <button id="poisonBtn">🧪 毒药</button>
      <button id="shootBtn">🔫 射击</button>
      <button id="reviveBtn">✨ 复活</button>
    </div>

    <div class="section" id="resultSection" style="display:none;">
      <p id="resultText"></p>
      <button id="nextPhaseBtn">➡️ 下一回合</button>
    </div>

    <div class="section" id="hostPanel" style="display:none; margin-top:20px; padding:15px; background:#f8f9fa; border-radius:10px;">
      <h3>🎮 房主控制面板</h3>
      <p>当前玩家：<span id="currentPlayers">0</span> / <span id="totalPlayers">0</span></p>
      <button id="startGameBtn">▶️ 开始游戏</button>
    </div>

    <p class="tip">💡 游戏状态由房主控制，其他玩家请等待指令。</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
